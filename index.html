<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promessômetro Premium João Campos - Jamildo.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS: Visual Premium, Dinâmico e Alta Legibilidade */
        :root {
            --azul-jamildo: #024796;
            --laranja-jamildo: #f83d03;
            --branco: #ffffff;
            --cinza-fundo: #f0f2f5;
            --cinza-texto: #4a4a4a;
            --preto-titulo: #1a1a1a;
            --sombra-card: 0 10px 30px rgba(0,0,0,0.08);
            --transicao: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--cinza-fundo);
            color: var(--cinza-texto);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Container Principal do Dashboard */
        .dashboard-container {
            width: 100%;
            max-width: 1300px;
            background-color: var(--branco);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 8px solid var(--laranja-jamildo);
            display: flex;
            flex-direction: column;
        }

        /* Cabeçalho Premium com Logo Branca */
        .dashboard-header {
            background-color: var(--azul-jamildo);
            color: var(--branco);
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--laranja-jamildo);
        }

        .header-title h1 {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 32px;
            letter-spacing: -1.5px;
        }

        .header-title p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 2px;
        }

        .logo-jamildo {
            max-width: 180px;
            height: auto;
        }

        /* Seção do Perfil e Estatísticas */
        .profile-stats-section {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 40px;
            padding: 40px;
            border-bottom: 1px solid #eee;
            background-color: #fbfbfb;
        }

        .photo-frame {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid var(--laranja-jamildo);
            box-shadow: var(--sombra-card);
            transition: var(--transicao);
            cursor: pointer;
        }

        .photo-frame:hover {
            transform: scale(1.03) rotate(2deg);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Ajustado para 2 colunas */
            gap: 25px;
        }

        .stat-card {
            background-color: var(--branco);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 1px solid #eee;
            transition: var(--transicao);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card.destaque {
            border-left: 5px solid var(--laranja-jamildo);
            box-shadow: 0 5px 15px rgba(248, 61, 3, 0.05);
        }

        .stat-card:not(.destaque) {
            border-left: 5px solid var(--azul-jamildo);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--sombra-card);
        }

        .stat-emoji {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .stat-number {
            font-size: 50px;
            font-weight: 800;
            color: var(--azul-jamildo);
            letter-spacing: -2px;
        }

        .stat-card.destaque .stat-number {
            color: var(--laranja-jamildo);
        }

        .stat-label {
            font-size: 13px;
            text-transform: uppercase;
            color: #666;
            font-weight: 700;
            margin-top: 10px;
        }

        /* Seção de Filtros */
        .filters-section {
            padding: 25px 40px;
            background-color: var(--branco);
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px 15px 55px;
            border: 2px solid #e1e1e1;
            border-radius: 30px;
            font-size: 15px;
            transition: var(--transicao);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--laranja-jamildo);
            box-shadow: 0 0 0 4px rgba(248, 61, 3, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 18px;
            font-size: 18px;
            color: #999;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
            margin-right: 10px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 1px solid #e1e1e1;
            background-color: #f9f9f9;
            color: var(--azul-jamildo);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transicao);
        }

        .filter-btn:hover {
            background-color: #eee;
        }

        .filter-btn.active {
            background-color: var(--laranja-jamildo);
            color: var(--branco);
            border-color: var(--laranja-jamildo);
            box-shadow: 0 4px 10px rgba(248, 61, 3, 0.2);
        }

        /* Grid Dinâmico */
        .promises-grid {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .promise-card {
            background-color: var(--branco);
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 25px;
            transition: var(--transicao);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .promise-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--sombra-card);
            border-color: #e0e0e0;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #999;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-theme {
            color: var(--azul-jamildo);
        }

        .card-main {
            display: flex;
            align-items: start;
            gap: 18px;
        }

        .card-emoji {
            font-size: 32px;
            margin-top: 3px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--preto-titulo);
            line-height: 1.3;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #eee;
            color: #666;
            padding: 5px 10px;
            border-radius: 15px;
            transition: var(--transicao);
        }

        .promise-card:hover .tag {
            background-color: var(--azul-jamildo);
            color: var(--branco);
        }

        .card-details {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .promise-card.expanded .card-details {
            display: block;
        }

        .expand-icon {
            position: absolute;
            right: 20px;
            bottom: 15px;
            font-size: 12px;
            color: #bbb;
            transition: var(--transicao);
        }

        .promise-card.expanded .expand-icon {
            transform: rotate(180deg);
            color: var(--laranja-jamildo);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .promise-card { animation: fadeIn 0.5s ease-out; }

        .promises-grid.filtering .promise-card {
            opacity: 0.1;
            transform: scale(0.95);
        }

        @media (max-width: 900px) {
            .profile-stats-section {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }
            .photo-frame { margin: 0 auto; width: 180px; height: 180px; }
            .stats-grid { grid-template-columns: 1fr; }
            .promises-grid { grid-template-columns: 1fr; padding: 20px; }
        }

        @media (max-width: 600px) {
            .dashboard-header { flex-direction: column; gap: 15px; text-align: center; }
            .header-title h1 { font-size: 26px; }
            .logo-jamildo { max-width: 150px; }
            .filters-section { padding: 20px; }
            .filter-group { justify-content: center; }
        }
    </style>
</head>

    const grid = document.getElementById('promisesGrid');
    const searchInput = document.getElementById('searchInput');

    // GERADOR DINÂMICO DOS BOTÕES DE TEMA
    function setupThemeFilters() {
        const themeFiltersContainer = document.getElementById('themeFilters');
        // Extrai todos os temas únicos presentes na lista de promessas
        const uniqueThemes = [...new Set(promisesData.map(p => p.tema))].sort();

        uniqueThemes.forEach(tema => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.setAttribute('data-filter', tema);
            btn.setAttribute('data-type', 'theme');
            btn.textContent = tema;
            themeFiltersContainer.appendChild(btn);
        });
    }

    function renderPromises(data) {
        grid.innerHTML = '';

        if (data.length === 0) {
            grid.innerHTML = '<p style="text-align:center; padding: 60px; grid-column: 1/-1; color: #666;">Nenhuma promessa encontrada com os critérios selecionados.</p>';
            return;
        }

        data.forEach(promise => {
            const card = document.createElement('div');
            card.className = 'promise-card';
            
            let tagsHtml = promise.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

            card.innerHTML = `
                <div class="card-meta">
                    <span class="card-date">${promise.data}</span>
                    <span class="card-theme">${promise.tema}</span>
                </div>
                <div class="card-main">
                    <div class="card-emoji">${promise.emoji}</div>
                    <div class="card-title-area">
                        <h3 class="card-title">${promise.titulo}</h3>
                        <p style="font-size: 13px; color: #777; margin-top: 5px;">${promise.resumo}</p>
                        <div class="card-tags">${tagsHtml}</div>
                    </div>
                </div>
                <div class="card-details">
                    <strong>Detalhes Completos:</strong><br>
                    ${promise.detalhes}
                </div>
                <span class="expand-icon">▼</span>
            `;

            card.addEventListener('click', () => {
                const currentlyExpanded = document.querySelector('.promise-card.expanded');
                if (currentlyExpanded && currentlyExpanded !== card) {
                    currentlyExpanded.classList.remove('expanded');
                }
                card.classList.toggle('expanded');
            });

            grid.appendChild(card);
        });
    }

    function filterPromises() {
        const searchText = searchInput.value.toLowerCase().trim();
        const activeMonth = document.querySelector('.filter-btn.active[data-type="month"]').getAttribute('data-filter');
        const activeTheme = document.querySelector('.filter-btn.active[data-type="theme"]').getAttribute('data-filter');

        const filtered = promisesData.filter(p => {
            const matchesSearch = searchText === '' || 
                                 p.titulo.toLowerCase().includes(searchText) || 
                                 p.resumo.toLowerCase().includes(searchText) || 
                                 p.detalhes.toLowerCase().includes(searchText) || 
                                 p.tags.some(tag => tag.toLowerCase().includes(searchText));
            
            const matchesMonth = activeMonth === 'todos' || p.mes === activeMonth;
            const matchesTheme = activeTheme === 'todos' || p.tema === activeTheme;

            return matchesSearch && matchesMonth && matchesTheme;
        });

        grid.classList.add('filtering');

        setTimeout(() => {
            renderPromises([...filtered].reverse());
            grid.classList.remove('filtering');
        }, 150);
    }

    // INICIALIZAÇÃO
    setupThemeFilters(); // Cria os botões de tema com base nos dados

    // Adiciona evento aos botões de filtro (Mês e Tema)
    const filters = document.querySelectorAll('.filter-btn');
    filters.forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.getAttribute('data-type');
            document.querySelector(`.filter-btn.active[data-type="${type}"]`).classList.remove('active');
            btn.classList.add('active');
            filterPromises();
        });
    });

    searchInput.addEventListener('input', filterPromises);

    document.getElementById('totalPromessas').innerText = promisesData.length;
    renderPromises([...promisesData].reverse());

</script>
